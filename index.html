<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebDev Academy — Learn Web Development</title>
  <meta name="description" content="A bilingual (English + Myanmar) learning platform for mastering web development: HTML, CSS, JavaScript and more." />
  <meta name="theme-color" content="#a435f0" />

  <!-- Favicon: inline SVG (no extra file needed) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237b2ff7'/%3E%3Cstop offset='.6' stop-color='%23a435f0'/%3E%3Cstop offset='1' stop-color='%23c86dd7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Ctext x='50' y='66' font-size='46' font-family='monospace' font-weight='bold' fill='white' text-anchor='middle'%3E&lt;/&gt;%3C/text%3E%3C/svg%3E" />

  <!-- Social share (Open Graph + Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://myominthet99.github.io/webdev-academy/" />
  <meta property="og:title" content="WebDev Academy — Learn Web Development" />
  <meta property="og:description" content="Free, bilingual (English + Myanmar) courses in HTML, CSS, JavaScript, Python & Full Stack — with an AI tutor, code playground, quizzes and certificates. Learn on your phone." />
  <meta property="og:image" content="https://myominthet99.github.io/webdev-academy/social-card.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://myominthet99.github.io/webdev-academy/social-card.png" />

  <!-- PWA (installable + offline) -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/">
      <span class="brand-mark">&lt;/&gt;</span>
      <span class="brand-name">WebDev<strong>Academy</strong></span>
    </a>

    <nav class="topnav">
      <a id="nav-courses" href="#/courses">Courses</a>
      <a id="nav-roadmap" href="#/roadmap">Roadmap</a>
      <a id="nav-playground" href="#/playground">Playground</a>
      <a id="nav-tools" href="#/tools">Tools</a>
    </nav>

    <form class="searchbar" id="search-form" autocomplete="off">
      <input id="search-input" type="search" placeholder="Search for HTML, CSS, JavaScript…" aria-label="Search courses" />
      <button type="submit" aria-label="Search">&#128269;</button>
    </form>

    <nav class="topnav right">
      <a id="nav-mylearning" href="#/my-learning">My Learning</a>
      <button id="theme-toggle" class="lang-btn" type="button" title="Toggle theme">🌙</button>
      <button id="lang-toggle" class="lang-btn" type="button" title="Switch language / ဘာသာစကားပြောင်းရန်">မြန်မာ</button>
      <button id="install-btn" class="install-btn" type="button" hidden>📲 Install</button>
      <span class="pill" id="streak-pill" title="Day streak">&#128293; <span id="streak-count">0</span></span>
      <div id="auth-area" class="auth-area"></div>
    </nav>
  </header>

  <div id="announce-bar" class="announce-bar" hidden></div>

  <main id="app" class="app"></main>

  <!-- App-style bottom tab bar (mobile only) -->
  <nav id="tabbar" class="tabbar" aria-label="Quick navigation">
    <a href="#/" data-tab="home"><span class="tb-ic">🏠</span><span class="tb-lbl" id="tab-home"></span></a>
    <a href="#/courses" data-tab="courses"><span class="tb-ic">📚</span><span class="tb-lbl" id="tab-courses"></span></a>
    <a href="#/playground" data-tab="playground"><span class="tb-ic">🧪</span><span class="tb-lbl" id="tab-play"></span></a>
    <a href="#/tools" data-tab="tools"><span class="tb-ic">🧰</span><span class="tb-lbl" id="tab-tools"></span></a>
    <a href="#/my-learning" data-tab="me"><span class="tb-ic">👤</span><span class="tb-lbl" id="tab-me"></span></a>
  </nav>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <span class="brand-mark small">&lt;/&gt;</span>
        <strong>WebDev Academy</strong> — <span id="footer-tag">a demo learning platform. Built with plain HTML, CSS &amp; JavaScript.</span>
      </div>
      <div class="muted" id="footer-saved">Your progress is saved in this browser (localStorage). No account needed.</div>
    </div>
  </footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
